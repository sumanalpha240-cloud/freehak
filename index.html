<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Hack Premium</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0a0f1f, #02040a);
    color: white;
}

/* Page system */
.page { display: none; }
.active { display: block; }

/* Neon Glow Animation */
@keyframes glow {
    0% { box-shadow: 0 0 10px #00e5ff; }
    50% { box-shadow: 0 0 25px #00e5ff, 0 0 40px #6a5cff; }
    100% { box-shadow: 0 0 10px #00e5ff; }
}

/* Top badges */
.top {
    display: flex;
    justify-content: space-between;
    padding: 15px;
}

.badge {
    padding: 8px 15px;
    border-radius: 30px;
    background: rgba(0,255,255,0.1);
    border: 1px solid #00e5ff;
    backdrop-filter: blur(10px);
    animation: glow 2s infinite;
}

/* Telegram */
.telegram {
    margin: 20px;
    padding: 18px;
    text-align: center;
    border-radius: 40px;
    font-size: 18px;
    background: linear-gradient(135deg,#00cfff,#6a5cff);
    animation: glow 2s infinite;
    cursor: pointer;
}

/* Cards */
.card {
    margin: 20px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(0,255,255,0.3);
    text-align: center;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px #00e5ff;
}

/* Neon border effect */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 25px;
    padding: 2px;
    background: linear-gradient(45deg,#00e5ff,#6a5cff);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
}

.card img {
    width: 90px;
    margin-bottom: 10px;
}

/* Prediction page */
.header {
    text-align: center;
    font-size: 22px;
    padding: 10px;
    color: #00e5ff;
    text-shadow: 0 0 15px #00e5ff;
}

.chat {
    padding: 15px;
    height: 55vh;
    overflow-y: auto;
}

/* Messages */
.msg {
    max-width: 75%;
    padding: 14px;
    border-radius: 18px;
    margin: 10px 0;
}

.left {
    background: rgba(0,255,255,0.08);
    border: 1px solid #00e5ff;
    box-shadow: 0 0 15px #00e5ff33;
}

.right {
    background: linear-gradient(135deg,#6a5cff,#00cfff);
    margin-left: auto;
    box-shadow: 0 0 20px #00cfff;
}

/* 🔥 ULTRA PREMIUM INPUT */
.input-box {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    padding: 10px;
}

input {
    flex: 1;
    padding: 16px;
    border-radius: 40px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 16px;
    box-shadow: inset 0 0 10px #00e5ff, 0 0 15px #00e5ff;
}

button {
    margin-left: 10px;
    padding: 16px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg,#00cfff,#6a5cff);
    box-shadow: 0 0 20px #00cfff, 0 0 40px #6a5cff;
    cursor: pointer;
    font-size: 18px;
    color: white;
}

/* Result */
.result {
    color: #00ffcc;
    font-weight: bold;
    text-shadow: 0 0 15px #00ffcc;
}

/* Back */
.back {
    margin: 10px;
    color: #00e5ff;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div class="top">
    <div class="badge">⚡ 100% SAFE</div>
    <div class="badge">✅ ACTIVE</div>
</div>

<div class="telegram" onclick="window.open('https://t.me/freehakcolour')">
    🚀 Join Telegram
</div>

<div class="card" onclick="openPrediction('91Club')">
    <img src="img1.png">
    <h3>91Club (Mod)</h3>
</div>

<div class="card" onclick="openPrediction('55Club')">
    <img src="img2.png">
    <h3>55Club (Mod)</h3>
</div>

<div class="card" onclick="openPrediction('IN999')">
    <img src="img3.png">
    <h3>IN999 (Mod)</h3>
</div>

</div>

<!-- PREDICTION -->
<div id="prediction" class="page">

<div class="back" onclick="goBack()">⬅ Back</div>

<div class="header" id="title"></div>

<div class="chat" id="chat">
    <div class="msg left">✨ Enter 3-digit number</div>
</div>

<div class="input-box">
    <input type="number" id="input" placeholder="Enter number...">
    <button onclick="send()">➤</button>
</div>

</div>

<script>
function openPrediction(name){
    home.classList.remove("active");
    prediction.classList.add("active");
    title.innerText = name + " Prediction";
}

function goBack(){
    prediction.classList.remove("active");
    home.classList.add("active");
}

function send(){
    let input = document.getElementById("input").value;
    let chat = document.getElementById("chat");

    if(input==="") return;

    chat.innerHTML += `<div class="msg right">${input}</div>`;

    if(input.length!==3){
        chat.innerHTML += `<div class="msg left">❌ Only 3-digit</div>`;
    } else {
        let result = Math.random()<0.5?"SMALL":"BIG";
        setTimeout(()=>{
            chat.innerHTML += `<div class="msg left">💡 Result: <span class="result">${result}</span></div>`;
            chat.scrollTop = chat.scrollHeight;
        },700);
    }

    document.getElementById("input").value="";
}
</script>

</body>
</html>
